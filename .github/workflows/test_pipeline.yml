name: 🧪 Full Pipeline Test (Manual)

# Run manually from the GitHub Actions UI to validate everything before deployment.
# Uses --test flags on each script — NO GitHub writes are performed.
# The job will succeed only if all test steps pass.

on:
  workflow_dispatch:
    inputs:
      skip_odds:
        description: 'Skip BestFightOdds scraping (use mock odds)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Connectivity & scraping tests (no model needed)
  # ────────────────────────────────────────────────────────────────────────────
  test-scraping:
    name: "🌐 Scraping & Connectivity Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas numpy tqdm

      - name: "TEST: 02_scrape_weekly_update — UFCStats & UFC.com connectivity"
        run: |
          echo "=== Testing UFCStats event scraping and UFC.com rankings ==="
          python scripts/02_scrape_weekly_update.py --test
        continue-on-error: false

      - name: "TEST: 04_predict — UFCStats upcoming event + BFO odds + clean_event_name()"
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: |
          echo "=== Testing prediction scraping + filename audit ==="
          if [ "${{ github.event.inputs.skip_odds }}" = "true" ]; then
            python scripts/04_predict.py --test --mock
          else
            python scripts/04_predict.py --test
          fi
        continue-on-error: false

      - name: "TEST: 05_scrape_results — UFCStats results + fight-existence check"
        run: |
          echo "=== Testing results scraping and fight-existence validation ==="
          python scripts/05_scrape_results.py --test
        # This step is expected to show 'no event found' mid-week — that's OK
        continue-on-error: true

      - name: "TEST: v1_scrape_results — fight-existence check (V1)"
        run: |
          echo "=== Testing V1 results scraping ==="
          python scripts/v1_scrape_results.py --test
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Data pipeline logic tests (offline, no network needed)
  # ────────────────────────────────────────────────────────────────────────────
  test-data-pipeline:
    name: "🔢 Data Pipeline Logic Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas numpy scipy scikit-learn tqdm

      - name: "TEST: 02_scrape_weekly_update — merge logic (offline, synthetic data)"
        run: |
          echo "=== Testing master CSV + rankings merge logic ==="
          python scripts/02_scrape_weekly_update.py --test

      - name: "TEST: clean_event_name() matches JS cleanEventName() exactly"
        run: |
          python3 - <<'PYEOF'
          import re, sys

          def clean_event_name_py(name):
              """Python implementation from 04_predict.py"""
              stripped = re.sub(r'[^\w\s]', '', name, flags=re.ASCII)
              return re.sub(r'\s+', '_', stripped)

          def clean_event_name_js(name):
              """Simulate JS: .replace(/[^\w\s]/g,'').replace(/\s+/g,'_')"""
              stripped = re.sub(r'[^\w\s]', '', name, flags=re.ASCII)
              return re.sub(r'\s+', '_', stripped)

          cases = [
              ("UFC 309: Jones vs Miocic",            "UFC_309_Jones_vs_Miocic"),
              ("UFC Fight Night: Holloway vs Topuria", "UFC_Fight_Night_Holloway_vs_Topuria"),
              ("UFC 310",                              "UFC_310"),
              ("UFC Fight Night",                      "UFC_Fight_Night"),
              ("UFC Fight Night: dos Santos vs Tuivasa", "UFC_Fight_Night_dos_Santos_vs_Tuivasa"),
              ("UFC 300: Pereira vs Hill",             "UFC_300_Pereira_vs_Hill"),
          ]

          all_pass = True
          for name, expected in cases:
              py_result = clean_event_name_py(name)
              js_result = clean_event_name_js(name)
              ok = (py_result == expected == js_result)
              status = "✓" if ok else "✗"
              print(f"  {status}  '{name}'")
              print(f"       py={py_result!r}  js={js_result!r}  expected={expected!r}")
              if not ok:
                  all_pass = False

          if all_pass:
              print("\n✓ ALL clean_event_name() tests passed — Python/JS filenames will match")
              sys.exit(0)
          else:
              print("\n✗ FAILURES — Python and JS will generate different filenames")
              sys.exit(1)
          PYEOF

      - name: "TEST: fight-existence check logic (unit tests)"
        run: |
          python3 - <<'PYEOF'
          import sys

          # Simulate the match_result function from 05_scrape_results.py
          def match_result(fighter_name, winners_dict, fought_set):
              name_l = fighter_name.lower().strip() if fighter_name else ""
              if name_l in fought_set:
                  return winners_dict.get(name_l)
              last = name_l.split()[-1] if name_l else ""
              for k in fought_set:
                  if last and last in k:
                      return winners_dict.get(k)
              parts = [p for p in name_l.split() if len(p) > 3]
              for k in fought_set:
                  if any(p in k for p in parts):
                      return winners_dict.get(k)
              return None  # fight not confirmed

          # Synthetic test data
          winners = {"jon jones": "W", "stipe miocic": "L",
                     "alex pereira": "W", "khalil rountree": "L"}
          fought  = set(winners.keys())

          tests = [
              # (fighter_name, expected_result, description)
              ("Jon Jones",      "W",  "Exact match winner"),
              ("Stipe Miocic",   "L",  "Exact match loser"),
              ("Jones",          "W",  "Last-name match winner"),
              ("Miocic",         "L",  "Last-name match loser"),
              ("Alex Pereira",   "W",  "Full name match winner"),
              ("Rountree",       "L",  "Last-name match loser"),
              ("Cancelled Fighter", None, "Cancelled bout → None, NOT 'L'"),
              ("Unknown Person",    None, "Unknown fighter → None, NOT 'L'"),
              ("",                  None, "Empty name → None"),
          ]

          all_pass = True
          for name, expected, desc in tests:
              got = match_result(name, winners, fought)
              ok  = got == expected
              status = "✓" if ok else "✗"
              print(f"  {status}  {desc}")
              print(f"       input={name!r}  got={got!r}  expected={expected!r}")
              if not ok:
                  all_pass = False

          # Critical: cancelled bout (fighter not in fought_set) must return None
          # to ensure they're never scored as a loss
          assert match_result("Cancelled Fighter", winners, fought) is None, \
              "CRITICAL: cancelled fighter must return None, not 'L'"

          if all_pass:
              print("\n✓ All fight-existence check tests passed")
              sys.exit(0)
          else:
              print("\n✗ FAILURES in fight-existence check — results would be incorrect")
              sys.exit(1)
          PYEOF

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Model & prediction pipeline (uses synthetic data, no GitHub reads)
  # ────────────────────────────────────────────────────────────────────────────
  test-model-pipeline:
    name: "🤖 Model & Prediction Pipeline Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas numpy scipy scikit-learn tqdm

      - name: "TEST: 03_train_model — offline feature engineering with synthetic data"
        run: |
          python3 - <<'PYEOF'
          """
          Smoke-test 03_train_model feature engineering functions
          using synthetic fight data — no GitHub I/O required.
          """
          import sys, warnings, numpy as np, pandas as pd
          warnings.filterwarnings("ignore")
          sys.path.insert(0, "scripts")

          # We can't import 03_train_model directly (raises on missing PAT at module level)
          # Instead we inline the key functions and test them with synthetic data.

          # ── Synthetic dataset ────────────────────────────────────────────────
          np.random.seed(42)
          n = 200
          fighters = ["Fighter_A", "Fighter_B", "Fighter_C", "Fighter_D"]
          events   = ["Event_1", "Event_2", "Event_3", "Event_4", "Event_5"]
          dates    = pd.date_range("2020-01-01", periods=n, freq="7D")

          df = pd.DataFrame({
              "fighter":           np.random.choice(fighters, n),
              "opponent":          np.random.choice(fighters, n),
              "event":             np.random.choice(events, n),
              "event_date":        dates,
              "weight_class":      np.random.choice(["Lightweight", "Welterweight", "Middleweight"], n),
              "won":               np.random.randint(0, 2, n),
              "sig_str_landed":    np.random.randint(10, 80, n).astype(float),
              "sig_str_att":       np.random.randint(40, 120, n).astype(float),
              "td_landed":         np.random.randint(0, 5, n).astype(float),
              "td_att":            np.random.randint(0, 10, n).astype(float),
              "ctrl_seconds":      np.random.randint(0, 180, n).astype(float),
              "kd":                np.random.randint(0, 2, n).astype(float),
              "sub_att":           np.random.randint(0, 3, n).astype(float),
              "head_landed":       np.random.randint(5, 40, n).astype(float),
              "body_landed":       np.random.randint(2, 20, n).astype(float),
              "leg_landed":        np.random.randint(0, 15, n).astype(float),
              "distance_landed":   np.random.randint(5, 40, n).astype(float),
              "clinch_landed":     np.random.randint(0, 10, n).astype(float),
              "ground_landed":     np.random.randint(0, 10, n).astype(float),
              "fight_url":         [f"http://example.com/fight/{i}" for i in range(n)],
              "method":            np.random.choice(["KO/TKO", "Submission", "Decision - Unanimous"], n),
          })
          df["sig_str_pct"]  = df["sig_str_landed"] / df["sig_str_att"].clip(lower=1)
          df["td_pct"]       = df["td_landed"] / df["td_att"].clip(lower=1)
          df["sig_str_att"]  = df["sig_str_att"]
          df["total_str_landed"] = df["sig_str_landed"] + df["ground_landed"]
          df["total_str_att"]    = df["sig_str_att"] + df["ground_landed"]
          df["head_att"]         = (df["head_landed"] * 1.5).astype(int).astype(float)
          df["body_att"]         = (df["body_landed"] * 1.5).astype(int).astype(float)
          df["leg_att"]          = (df["leg_landed"]  * 1.5).astype(int).astype(float)
          df["distance_att"]     = (df["distance_landed"] * 1.4).astype(int).astype(float)
          df["clinch_att"]       = (df["clinch_landed"] * 1.4).astype(int).astype(float)
          df["ground_att"]       = (df["ground_landed"] * 1.4).astype(int).astype(float)
          df["reversals"]        = 0
          df["title_bout"]       = False
          df["number_of_rounds"] = 3
          df["implied_prob"]     = np.random.uniform(0.3, 0.7, n)

          print(f"Synthetic data: {len(df)} rows, {df['fighter'].nunique()} fighters")

          # ── Test 1: Load & clean ─────────────────────────────────────────────
          df["event_date"] = pd.to_datetime(df["event_date"])
          df["weight_class"] = df["weight_class"].str.strip().str.title()
          print(f"✓ Load & clean: {len(df)} rows")

          # ── Test 2: Career stats computation ────────────────────────────────
          CAREER_STAT_COLS = ["kd","sig_str_landed","sig_str_att","sig_str_pct",
                              "td_landed","td_att","td_pct","sub_att","ctrl_seconds",
                              "head_landed","body_landed","leg_landed","distance_landed",
                              "clinch_landed","ground_landed"]

          df_s = df.sort_values(["fighter","event_date"]).copy()
          records = []
          for fighter, group in df_s.groupby("fighter"):
              group = group.sort_values("event_date").reset_index(drop=True)
              running = {c: [] for c in CAREER_STAT_COLS}
              for i, row in group.iterrows():
                  avgs = {f"career_avg_{c}": np.mean(running[c]) if running[c] else np.nan
                          for c in CAREER_STAT_COLS}
                  records.append({"fighter": fighter,
                                  "fight_url": row["fight_url"],
                                  "event_date": row["event_date"],
                                  "career_fights_before": len(running[CAREER_STAT_COLS[0]]),
                                  **avgs})
                  for c in CAREER_STAT_COLS:
                      if c in row and not pd.isna(row[c]):
                          running[c].append(float(row[c]))

          career_df = pd.DataFrame(records)
          assert len(career_df) == len(df), f"Row count mismatch: {len(career_df)} vs {len(df)}"
          assert "career_avg_sig_str_landed" in career_df.columns
          # Leak check: first fight per fighter should have NaN averages
          first_fights = career_df[career_df["career_fights_before"] == 0]
          assert first_fights["career_avg_sig_str_landed"].isna().all(), \
              "First fight has non-NaN averages — data leakage!"
          print(f"✓ Career stats: {len(career_df)} rows, leak-check passed")

          # ── Test 3: Matchup feature building ────────────────────────────────
          merged = df.merge(career_df[["fighter","fight_url"] +
                            [c for c in career_df.columns if c.startswith("career_")]],
                            on=["fighter","fight_url"], how="left")
          assert len(merged) == len(df)
          print(f"✓ Career stats merge: {len(merged)} rows")

          # ── Test 4: LASSO model training with synthetic data ─────────────────
          from sklearn.linear_model import LogisticRegression
          from sklearn.preprocessing import StandardScaler
          from sklearn.pipeline import Pipeline

          diff_cols = [c for c in merged.columns if c.startswith("career_avg_")]
          pairs = []
          for url, g in merged.groupby("fight_url"):
              if len(g) >= 2:
                  f1, f2 = g.iloc[0], g.iloc[1]
                  row = {"f1_won": int(f1["won"])}
                  for c in diff_cols:
                      row[f"diff_{c}"] = f1.get(c, 0) - f2.get(c, 0)
                  pairs.append(row)

          if len(pairs) >= 20:
              pairs_df = pd.DataFrame(pairs)
              feat_cols = [c for c in pairs_df.columns if c.startswith("diff_")]
              X = pairs_df[feat_cols].fillna(0).values
              y = pairs_df["f1_won"].values
              pipeline = Pipeline([
                  ("scaler", StandardScaler()),
                  ("clf", LogisticRegression(C=1.0, max_iter=200, random_state=42))
              ])
              pipeline.fit(X, y)
              probs = pipeline.predict_proba(X[:5])
              assert probs.shape == (5, 2)
              assert all(0.0 <= p <= 1.0 for p in probs[:, 1])
              print(f"✓ Logit model training: {len(pairs)} matchups, probs={probs[:3,1].round(3)}")
          else:
              print(f"  [SKIP] Too few matchup pairs ({len(pairs)}) for model test")

          print("\n✓ All 03_train_model synthetic tests passed")
          PYEOF

      - name: "TEST: v1_train_model — feature engineering with synthetic data"
        run: |
          python3 - <<'PYEOF'
          import sys, warnings, numpy as np, pandas as pd
          warnings.filterwarnings("ignore")

          np.random.seed(7)
          n = 150
          fighters = ["V1_Fighter_A","V1_Fighter_B","V1_Fighter_C","V1_Fighter_D"]

          df = pd.DataFrame({
              "fighter":          np.random.choice(fighters, n),
              "event":            [f"Event_{i//10}" for i in range(n)],
              "date":             pd.date_range("2020-01-01", periods=n, freq="14D"),
              "weight_class":     np.random.choice(["Lightweight","Welterweight","Middleweight"], n),
              "result":           np.random.choice(["W","L"], n),
              "kd":               np.random.randint(0,2,n).astype(float),
              "sig_str_landed":   np.random.randint(20,80,n).astype(float),
              "sig_str_att":      np.random.randint(50,120,n).astype(float),
              "td_landed":        np.random.randint(0,5,n).astype(float),
              "td_att":           np.random.randint(0,10,n).astype(float),
              "sub_att":          np.random.randint(0,3,n).astype(float),
              "ctrl_seconds":     np.random.randint(0,180,n).astype(float),
              "head_landed":      np.random.randint(10,50,n).astype(float),
              "body_landed":      np.random.randint(2,20,n).astype(float),
              "leg_landed":       np.random.randint(0,15,n).astype(float),
              "distance_landed":  np.random.randint(5,40,n).astype(float),
              "clinch_landed":    np.random.randint(0,10,n).astype(float),
              "ground_landed":    np.random.randint(0,10,n).astype(float),
              "total_str_landed": np.random.randint(30,100,n).astype(float),
              "total_str_att":    np.random.randint(60,130,n).astype(float),
          })

          # Career averages (leak-free)
          df = df.sort_values("date")
          career_rows = []
          for _, row in df.iterrows():
              fighter  = row["fighter"]
              fight_dt = row["date"]
              prior    = df[(df["fighter"] == fighter) & (df["date"] < fight_dt)]
              rec = {"fighter": fighter, "date": fight_dt}
              for col in ["kd","sig_str_landed","td_landed","sub_att","ctrl_seconds",
                          "head_landed","body_landed","leg_landed","distance_landed",
                          "clinch_landed","ground_landed"]:
                  rec[f"avg_{col}"] = prior[col].mean() if len(prior) else np.nan
              career_rows.append(rec)

          career_df = pd.DataFrame(career_rows)
          assert len(career_df) == n
          # Check no leakage: first-fight rows should have NaN averages
          first_fights = []
          for fighter, grp in career_df.groupby("fighter"):
              first_fights.append(grp.sort_values("date").iloc[0])
          for f in first_fights:
              assert pd.isna(f["avg_kd"]), f"First fight for {f['fighter']} has non-NaN avg_kd"
          print(f"✓ V1 career averages: {len(career_df)} rows, leak-check passed")

          # Matchup feature building
          df["date"]  = pd.to_datetime(df["date"])
          career_df["date"] = pd.to_datetime(career_df["date"])
          merged = df.merge(career_df, on=["fighter","date"], how="left")

          matchups = []
          for (event, date), grp in merged.groupby(["event","date"]):
              fighters_g = grp.reset_index(drop=True)
              for i in range(0, len(fighters_g)-1, 2):
                  f1 = fighters_g.iloc[i]
                  f2 = fighters_g.iloc[i+1]
                  row = {"f1_won": 1 if f1["result"] == "W" else 0}
                  for col in ["kd","sig_str_landed","td_landed","sub_att","ctrl_seconds"]:
                      row[f"diff_{col}"] = (f1.get(f"avg_{col}", 0) or 0) - (f2.get(f"avg_{col}", 0) or 0)
                  matchups.append(row)

          if len(matchups) >= 5:
              from sklearn.linear_model import LinearRegression
              from sklearn.preprocessing import StandardScaler
              mdf = pd.DataFrame(matchups)
              feat_cols = [c for c in mdf.columns if c.startswith("diff_")]
              X = mdf[feat_cols].fillna(0).values
              y = mdf["f1_won"].values
              sc = StandardScaler(); X_sc = sc.fit_transform(X)
              lr = LinearRegression(); lr.fit(X_sc, y)
              preds = lr.predict(X_sc[:3])
              print(f"✓ V1 linear model training: {len(matchups)} matchups, sample preds={preds.round(3)}")
          else:
              print(f"  [SKIP] Not enough matchups ({len(matchups)}) — need at least 5")

          print("\n✓ All v1_train_model synthetic tests passed")
          PYEOF

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4: Statistics computation tests (offline)
  # ────────────────────────────────────────────────────────────────────────────
  test-statistics:
    name: "📊 Statistics Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scipy

      - name: "TEST: 06_statistics — computation with synthetic results data"
        run: |
          python3 - <<'PYEOF'
          import sys, warnings, numpy as np, pandas as pd
          from scipy import stats as scipy_stats
          warnings.filterwarnings("ignore")

          BREAKEVEN = 0.96

          # Synthetic bet results (winning model — above breakeven)
          np.random.seed(42)
          n = 80
          odds_list = np.random.choice([-150,-130,-110,110,130,150,200,-200], n)
          bet_sizes = np.random.choice([1,2,3], n).astype(float)

          def implied(o): return abs(o)/(abs(o)+100) if o < 0 else 100/(o+100)
          def pnl(won, odds, bet):
              if won:
                  return bet * ((100/abs(odds)) if odds < 0 else (odds/100))
              return -bet

          win_probs = np.array([implied(o) * 1.08 for o in odds_list])  # model beats market
          wins = np.random.binomial(1, np.minimum(win_probs, 0.99), n)

          total_return = np.array([
              pnl(wins[i], odds_list[i], bet_sizes[i]) + bet_sizes[i]
              for i in range(n)
          ])
          profit_mult = total_return / bet_sizes

          # T-test
          t, p2 = scipy_stats.ttest_1samp(profit_mult, BREAKEVEN)
          p1    = p2/2 if t > 0 else 1 - p2/2
          conclusion = "Reject H0" if p1 < 0.05 else "Fail to reject H0"

          print(f"  Synthetic stats:")
          print(f"    n={n}, mean_mult={profit_mult.mean():.3f}, "
                f"std={profit_mult.std():.3f}")
          print(f"    t={t:.3f}, p_one_sided={p1:.4f}")
          print(f"    Conclusion: {conclusion}")

          # Check output structure
          overall = {
              "total_bets":   n,
              "total_wins":   int(wins.sum()),
              "total_losses": int((1-wins).sum()),
              "win_rate_pct": round(float(wins.mean())*100, 2),
              "units_staked": round(float(bet_sizes.sum()), 2),
              "net_units":    round(float(total_return.sum() - bet_sizes.sum()), 2),
              "rtp_pct":      round(float(total_return.sum()/bet_sizes.sum())*100, 2),
          }
          t_test = {
              "null_hypothesis_value": BREAKEVEN,
              "t_statistic":           float(t),
              "p_value_one_sided":     float(p1),
              "conclusion":            conclusion,
          }

          # Validate JSON-serializability
          import json
          output = {"overall_performance": overall, "t_test": t_test}
          serialized = json.dumps(output, indent=2)
          parsed = json.loads(serialized)
          assert parsed["overall_performance"]["total_bets"] == n
          assert "conclusion" in parsed["t_test"]
          print(f"\n✓ Statistics output is valid JSON")
          print(f"  Net P&L: {overall['net_units']:+.2f}u  "
                f"Win rate: {overall['win_rate_pct']}%  "
                f"RTP: {overall['rtp_pct']}%")
          print("\n✓ All 06_statistics tests passed")
          PYEOF

      - name: "TEST: v1_statistics — computation with synthetic V1 results"
        run: |
          python3 - <<'PYEOF'
          import sys, warnings, numpy as np, pandas as pd
          from scipy import stats as scipy_stats
          warnings.filterwarnings("ignore")

          BREAKEVEN = 0.96

          np.random.seed(7)
          n = 60
          def build_v1_row(i):
              odds = np.random.choice([-140,-120,-110,110,120,140])
              bet  = np.random.choice([1,2,3])
              won  = np.random.binomial(1, 0.55)
              dec  = (100/abs(odds)+1) if odds < 0 else (odds/100+1)
              net  = bet*(dec-1) if won else -bet
              return {"bet_size": bet, "Odds": odds, "won": won,
                      "result": "W" if won else "L", "net": net,
                      "predicted_prob": np.random.uniform(0.4, 0.8),
                      "event_date": f"2024-{(i%12)+1:02d}-01"}
          rows = [build_v1_row(i) for i in range(n)]
          bets = pd.DataFrame(rows)

          def rtp(r):
              bet = r["bet_size"]; won = r["won"] == 1
              dec = (100/abs(r["Odds"])+1) if r["Odds"]<0 else (r["Odds"]/100+1)
              return float(dec) if won else 0.0

          bets["rtp"] = bets.apply(rtp, axis=1)
          t, p2 = scipy_stats.ttest_1samp(bets["rtp"], BREAKEVEN)
          p1    = p2/2 if t > 0 else 1 - p2/2

          net_units   = float(bets["net"].sum())
          units_staked = float(bets["bet_size"].sum())
          win_rate    = float(bets["won"].mean() * 100)
          rtp_pct     = float((units_staked + net_units) / units_staked * 100)

          print(f"  V1 synthetic stats: n={n}, win_rate={win_rate:.1f}%, "
                f"net={net_units:+.2f}u, RTP={rtp_pct:.1f}%")
          print(f"  t={t:.3f}, p={p1:.4f}")

          import json
          out = {
              "model": "V1",
              "overall_performance": {
                  "total_bets": n,
                  "total_wins": int(bets["won"].sum()),
                  "win_rate_pct": round(win_rate,2),
                  "net_units": round(net_units,2),
                  "rtp_pct": round(rtp_pct,2),
              },
              "t_test": {
                  "t_statistic": float(t),
                  "p_value_one_sided": float(p1),
                  "conclusion": "Reject H0" if p1 < 0.05 else "Fail to reject H0",
              }
          }
          json.dumps(out)  # serialization check
          print("\n✓ All v1_statistics tests passed")
          PYEOF

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 5: GitHub API & site-data audit (read-only)
  # ────────────────────────────────────────────────────────────────────────────
  test-github-api:
    name: "🔗 GitHub API & Site-Data Audit (read-only)"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: "TEST: GitHub API reachability & expected file paths"
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, requests

          token = os.environ.get("ZWINSHIP_PAT")
          if not token:
              print("  [SKIP] ZWINSHIP_PAT not set — skipping GitHub API test")
              sys.exit(0)

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json",
          }

          # Files the pipeline reads/writes — check they're reachable
          files_to_check = {
              "zwinship/OctaStats_UFC_Model_V2": [
                  "data/raw/fight_stats.csv",
                  "data/processed/career_styled.csv",
                  "data/model_bundle.pkl",
                  "titles/fight_titles.json",
                  "statistics/v2_statistical_analysis.json",
              ],
              "zwinship/UFC_Model": [
                  "data/v1_model_bundle.pkl",
                  "data/career_styled_v1.csv",
                  "predictions/v1_predictions_latest.csv",
                  "statistics/v1_statistical_analysis.json",
              ],
          }

          all_ok = True
          for repo, paths in files_to_check.items():
              print(f"\n  Repo: {repo}")
              for path in paths:
                  url  = f"https://api.github.com/repos/{repo}/contents/{path}"
                  resp = requests.get(url, headers=headers, timeout=10)
                  icon = "✓" if resp.status_code == 200 else ("○" if resp.status_code == 404 else "✗")
                  note = "" if resp.status_code == 200 else f" (HTTP {resp.status_code})"
                  print(f"    {icon}  {path}{note}")
                  if resp.status_code not in (200, 404):
                      all_ok = False   # 404 is OK (file not yet created); other errors are not

          if all_ok:
              print("\n✓ GitHub API reachable; all files either present or not-yet-created")
          else:
              print("\n✗ GitHub API errors — check PAT permissions")
              sys.exit(1)
          PYEOF

      - name: "TEST: update_site.yml site-data.json builder — field validation"
        run: |
          python3 - <<'PYEOF'
          """
          Validate the site-data.json structure that update_site.yml produces.
          Checks that all fields the HTML pages expect are present.
          """
          import json, sys

          # Simulate what update_site.yml builds
          v2_stats_sample = {
              "overall_performance": {"total_bets":100,"win_rate_pct":55.0,"rtp_pct":108.0,"net_units":8.0},
              "t_test": {"t_statistic":1.8,"p_value_one_sided":0.038,"conclusion":"Reject H0"},
          }
          v1_stats_sample = {
              "overall_performance": {"total_bets":80,"win_rate_pct":53.0,"rtp_pct":105.0},
              "t_test": {"t_statistic":1.2,"p_value_one_sided":0.115,"conclusion":"Fail to reject H0"},
          }
          titles_sample = {
              "upcoming":      "UFC 310",
              "upcoming_date": "2024-12-07",
              "recent":        "UFC 309",
              "recent_date":   "2024-11-16",
              "updated_at":    "2024-11-20T12:00:00",
          }

          site_data = {
              "v2": {
                  "upcoming_event": titles_sample.get("upcoming", ""),
                  "upcoming_date":  titles_sample.get("upcoming_date", ""),
                  "recent_event":   titles_sample.get("recent", ""),
                  "recent_date":    titles_sample.get("recent_date", ""),
                  "data_base_url":  "https://raw.githubusercontent.com/zwinship/OctaStats_UFC_Model_V2/main",
                  "stats":          v2_stats_sample,
              },
              "v1": {
                  "data_base_url": "https://raw.githubusercontent.com/zwinship/UFC_Model/main",
                  "stats":         v1_stats_sample,
              },
              "last_updated": titles_sample.get("updated_at", ""),
          }

          # Fields the HTML pages read via main.js getV2Stats() / getV1Stats()
          required_fields = [
              ("v2.upcoming_event",),
              ("v2.upcoming_date",),
              ("v2.recent_event",),
              ("v2.recent_date",),
              ("v2.data_base_url",),
              ("v2.stats",),
              ("v1.data_base_url",),
              ("v1.stats",),
              ("last_updated",),
          ]

          all_ok = True
          for path in required_fields:
              obj = site_data
              for key in path[0].split("."):
                  obj = obj.get(key, None) if isinstance(obj, dict) else None
              ok = obj is not None
              print(f"  {'✓' if ok else '✗'}  site_data.{path[0]} = {str(obj)[:50]!r}")
              if not ok:
                  all_ok = False

          # Serialization check
          json.dumps(site_data)
          print(f"\n✓ site-data.json structure is valid JSON")

          if all_ok:
              print("✓ All required site-data fields present")
          else:
              print("✗ Missing required site-data fields — site will break")
              sys.exit(1)
          PYEOF

  # ────────────────────────────────────────────────────────────────────────────
  # FINAL: Summary
  # ────────────────────────────────────────────────────────────────────────────
  test-summary:
    name: "✅ Test Summary"
    runs-on: ubuntu-latest
    needs:
      - test-scraping
      - test-data-pipeline
      - test-model-pipeline
      - test-statistics
      - test-github-api
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "======================================"
          echo "OCTASTATS PIPELINE TEST RESULTS"
          echo "======================================"
          echo ""
          echo "Job results:"
          echo "  Scraping & Connectivity : ${{ needs.test-scraping.result }}"
          echo "  Data Pipeline Logic     : ${{ needs.test-data-pipeline.result }}"
          echo "  Model & Prediction      : ${{ needs.test-model-pipeline.result }}"
          echo "  Statistics              : ${{ needs.test-statistics.result }}"
          echo "  GitHub API & Site-Data  : ${{ needs.test-github-api.result }}"
          echo ""
          if [ "${{ needs.test-scraping.result }}" = "success" ] && \
             [ "${{ needs.test-data-pipeline.result }}" = "success" ] && \
             [ "${{ needs.test-model-pipeline.result }}" = "success" ] && \
             [ "${{ needs.test-statistics.result }}" = "success" ] && \
             [ "${{ needs.test-github-api.result }}" = "success" ]; then
            echo "✅ ALL TESTS PASSED — pipeline is ready for deployment"
          else
            echo "❌ SOME TESTS FAILED — review the logs above before deploying"
            exit 1
          fi
