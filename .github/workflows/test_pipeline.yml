name: 🧪 Full Pipeline Test (Manual)

# Run manually from the GitHub Actions UI to validate everything before deployment.
# Uses --test flags on each script — NO GitHub writes are performed.
# The job will succeed only if all test steps pass.

on:
  workflow_dispatch:
    inputs:
      skip_odds:
        description: 'Skip BestFightOdds scraping (use mock odds)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Validate fight_stats.csv schema — gates every downstream job
  # ────────────────────────────────────────────────────────────────────────────
  test-fight-stats-schema:
    name: "📋 fight_stats.csv Schema Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy requests

      - name: "TEST: fight_stats.csv exists and has correct schema"
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, requests, io
          import pandas as pd
          import numpy as np

          token = os.environ.get("ZWINSHIP_PAT")
          if not token:
              print("✗ ZWINSHIP_PAT not set")
              sys.exit(1)

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json",
          }

          url  = "https://api.github.com/repos/zwinship/OctaStats_UFC_Model_V2/contents/data/raw/fight_stats.csv"
          resp = requests.get(url, headers=headers, timeout=15)
          if resp.status_code != 200:
              print(f"✗ fight_stats.csv not found (HTTP {resp.status_code})")
              print("  → Push data/raw/fight_stats.csv to the repo first")
              sys.exit(1)

          import base64
          content = base64.b64decode(resp.json()["content"]).decode("utf-8")
          df = pd.read_csv(io.StringIO(content))
          print(f"✓ fight_stats.csv loaded: {len(df)} rows, {len(df.columns)} columns")

          # ── All 97 columns that 01_scrape_historical.py produces ──────────────
          REQUIRED_COLS = [
              "fight_url","event_name","event_date","event_location",
              "fighter","fighter_url","opponent","won","weight_class","title_bout",
              "method","finish_round","finish_time","time_format","referee",
              "finish_details","judge_scores","scorecard_margin",
              "kd","sig_str_landed","sig_str_att","sig_str_pct",
              "total_str_landed","total_str_att","td_landed","td_att","td_pct",
              "sub_att","reversals","ctrl_seconds",
              "head_landed","head_att","body_landed","body_att",
              "leg_landed","leg_att","distance_landed","distance_att",
              "clinch_landed","clinch_att","ground_landed","ground_att",
              "height_cms","reach_cms","weight_lbs","stance","age",
              "number_of_rounds","empty_arena","total_fight_time_secs",
              "wins","losses","draws",
              "current_win_streak","current_lose_streak","longest_win_streak",
              "wins_by_ko","wins_by_sub","wins_by_dec_unanimous","wins_by_dec_split",
              "wins_by_dec_majority","wins_by_tko_doctor",
              "total_rounds_fought","total_title_bouts",
              "height_dif","reach_dif","age_dif","win_dif","loss_dif",
              "win_streak_dif","lose_streak_dif","longest_win_streak_dif",
              "ko_dif","sub_dif","total_round_dif","total_title_bout_dif",
              "sig_str_dif","avg_sub_att_dif","avg_td_dif",
              "implied_prob","implied_prob_ko","implied_prob_sub",
              "implied_prob_dec","implied_prob_source",
              "historical_odds","historical_odds_opp","expected_value",
              "dec_odds","dec_odds_opp","sub_odds","sub_odds_opp","ko_odds","ko_odds_opp",
              "fighter_rank_wc","fighter_rank_pfp","diff_rank_wc","diff_rank_pfp",
          ]

          all_ok = True

          missing = [c for c in REQUIRED_COLS if c not in df.columns]
          extra   = [c for c in df.columns if c not in REQUIRED_COLS]
          if missing:
              print(f"\n✗ Missing columns ({len(missing)}): {missing}")
              all_ok = False
          else:
              print(f"✓ All {len(REQUIRED_COLS)} required columns present")
          if extra:
              print(f"  ℹ Extra columns (OK): {extra}")

          if len(df) < 2:
              print(f"✗ Too few rows ({len(df)}) — need at least 2 (one complete fight)")
              all_ok = False
          else:
              print(f"✓ Row count: {len(df)}")

          url_counts = df["fight_url"].value_counts()
          bad_urls   = url_counts[url_counts != 2]
          if len(bad_urls) > 0:
              print(f"✗ {len(bad_urls)} fight_urls don't have exactly 2 rows")
              all_ok = False
          else:
              print(f"✓ fight_url pairing: all {len(url_counts)} fights have exactly 2 rows")

          for furl, grp in df.groupby("fight_url"):
              if grp["won"].sum() != 1:
                  print(f"✗ fight {furl} has {grp['won'].sum()} winners (expected 1)")
                  all_ok = False
                  break
          else:
              print(f"✓ won column: each fight has exactly 1 winner")

          try:
              dates = pd.to_datetime(df["event_date"], errors="coerce")
              bad   = dates.isna().sum()
              if bad > 0:
                  print(f"✗ {bad} unparseable event_date values")
                  all_ok = False
              else:
                  print(f"✓ event_date: all parseable ({dates.min().date()} – {dates.max().date()})")
          except Exception as e:
              print(f"✗ event_date parse error: {e}")
              all_ok = False

          for col in ["sig_str_landed","sig_str_att","td_landed","td_att","ctrl_seconds"]:
              if col in df.columns:
                  pct  = df[col].notna().mean()
                  icon = "✓" if pct > 0.5 else ("~" if pct > 0 else "✗")
                  print(f"  {icon}  {col:<25} {pct:.0%} populated")
                  if pct == 0: all_ok = False

          if "implied_prob" in df.columns:
              ip  = pd.to_numeric(df["implied_prob"], errors="coerce")
              bad = ((ip < 0) | (ip > 1) | ip.isna()).sum()
              if bad > 0:
                  print(f"✗ implied_prob has {bad} invalid values (must be 0–1)")
                  all_ok = False
              else:
                  print(f"✓ implied_prob: all values in [0,1]")

          bad_diffs = 0
          for furl, grp in df.groupby("fight_url"):
              for col in ["height_dif","reach_dif","age_dif","win_dif","sig_str_dif"]:
                  if col in grp.columns:
                      vals = pd.to_numeric(grp[col], errors="coerce").dropna()
                      if len(vals) == 2 and abs(vals.sum()) > 0.1:
                          bad_diffs += 1
          if bad_diffs > 0:
              print(f"✗ {bad_diffs} diff column pairs don't sum to zero")
              all_ok = False
          else:
              print(f"✓ Diff columns: f1+f2 sums to zero for all fights")

          print(f"\n── 03_train_model.py readiness ──")
          CAREER_STAT_COLS = [
              "kd","sig_str_landed","sig_str_att","sig_str_pct",
              "total_str_landed","total_str_att","td_landed","td_att","td_pct",
              "sub_att","reversals","ctrl_seconds",
              "head_landed","head_att","body_landed","body_att",
              "leg_landed","leg_att","distance_landed","distance_att",
              "clinch_landed","clinch_att","ground_landed","ground_att",
          ]
          missing_c = [c for c in CAREER_STAT_COLS if c not in df.columns]
          if missing_c:
              print(f"✗ Missing CAREER_STAT_COLS: {missing_c}"); all_ok = False
          else:
              print(f"✓ All {len(CAREER_STAT_COLS)} CAREER_STAT_COLS present")

          print(f"\n── v1_train_model.py column compatibility ──")
          V1_STAT_COLS = [
              "kd","sig_str_landed","sig_str_att","total_str_landed",
              "total_str_att","td_landed","td_att","sub_att",
              "ctrl_seconds","head_landed","body_landed","leg_landed",
              "distance_landed","clinch_landed","ground_landed",
          ]
          missing_v1 = [c for c in V1_STAT_COLS if c not in df.columns]
          if missing_v1:
              print(f"✗ Missing V1 STAT_COLS: {missing_v1}"); all_ok = False
          else:
              print(f"✓ All {len(V1_STAT_COLS)} V1 STAT_COLS present")

          if "date" not in df.columns and "event_date" in df.columns:
              print(f"✓ fight_stats uses 'event_date'/'event_name'/'won' — v1_train_model.py aliases these correctly")

          if all_ok:
              print(f"\n✓ fight_stats.csv is valid and all pipelines are ready")
          else:
              print(f"\n✗ Issues found — fix before running Wednesday workflow")
              sys.exit(1)
          PYEOF

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Wednesday workflow simulation
  # ────────────────────────────────────────────────────────────────────────────
  test-wednesday-pipeline:
    name: "📅 Wednesday Pipeline (train model offline)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test-fight-stats-schema

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas numpy scipy scikit-learn tqdm

      - name: "TEST: 02_scrape_weekly_update — UFCStats & UFC.com connectivity"
        run: python scripts/02_scrape_weekly_update.py --test

      - name: "TEST: 03_train_model — full pipeline with real fight_stats.csv"
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: |
          python3 - <<'PYEOF'
          import sys, warnings, io, os, base64, requests, json, pickle
          import numpy as np, pandas as pd
          from datetime import datetime
          warnings.filterwarnings("ignore")

          token = os.environ.get("ZWINSHIP_PAT")
          headers = {"Authorization": f"token {token}",
                     "Accept": "application/vnd.github.v3+json"}

          url  = "https://api.github.com/repos/zwinship/OctaStats_UFC_Model_V2/contents/data/raw/fight_stats.csv"
          resp = requests.get(url, headers=headers, timeout=15)
          assert resp.status_code == 200, f"HTTP {resp.status_code}"
          content = base64.b64decode(resp.json()["content"]).decode("utf-8")
          df = pd.read_csv(io.StringIO(content))
          print(f"✓ Loaded fight_stats.csv: {len(df)} rows")

          df["event_date"] = pd.to_datetime(df["event_date"])
          df["weight_class"] = df["weight_class"].str.strip().str.title()
          df = df.dropna(subset=["sig_str_landed","sig_str_att","td_landed","td_att","ctrl_seconds"], how="all")
          for col in ["implied_prob","implied_prob_ko","implied_prob_sub","implied_prob_dec"]:
              if col in df.columns:
                  df[col] = pd.to_numeric(df[col], errors="coerce")
          print(f"✓ load_raw: {len(df)} rows after cleaning")

          CAREER_STAT_COLS = [
              "kd","sig_str_landed","sig_str_att","sig_str_pct",
              "total_str_landed","total_str_att","td_landed","td_att","td_pct",
              "sub_att","reversals","ctrl_seconds",
              "head_landed","head_att","body_landed","body_att",
              "leg_landed","leg_att","distance_landed","distance_att",
              "clinch_landed","clinch_att","ground_landed","ground_att",
          ]
          df_s = df.sort_values(["fighter","event_date"]).copy()
          records = []
          for fighter, group in df_s.groupby("fighter"):
              group = group.sort_values("event_date").reset_index(drop=True)
              running = {c: [] for c in CAREER_STAT_COLS}
              cw = cl = 0
              for i, row in group.iterrows():
                  avgs = {f"career_avg_{c}": np.mean(running[c]) if running[c] else np.nan
                          for c in CAREER_STAT_COLS}
                  records.append({"fighter": fighter, "fight_url": row["fight_url"],
                                  "event_date": row["event_date"],
                                  "career_fights_before": len(running[CAREER_STAT_COLS[0]]),
                                  "career_wins": cw, "career_losses": cl, **avgs})
                  for c in CAREER_STAT_COLS:
                      if c in row.index and not pd.isna(row[c]):
                          running[c].append(float(row[c]))
                  if row.get("won") == 1: cw += 1
                  else: cl += 1

          career_df = pd.DataFrame(records)
          assert len(career_df) == len(df)
          first = career_df[career_df["career_fights_before"] == 0]
          assert first["career_avg_sig_str_landed"].isna().all(), "DATA LEAKAGE detected"
          print(f"✓ compute_career_stats: {len(career_df)} rows, leak-check passed")

          STYLE_Z = 0.6
          def classify(row):
              kd  = row.get("career_avg_kd", 0) or 0
              sig = row.get("career_avg_sig_str_landed", 0) or 0
              td  = row.get("career_avg_td_landed", 0) or 0
              sub = row.get("career_avg_sub_att", 0) or 0
              ctrl= row.get("career_avg_ctrl_seconds", 0) or 0
              cli = row.get("career_avg_clinch_landed", 0) or 0
              dist= row.get("career_avg_distance_landed", 0) or 0
              if kd > STYLE_Z and sig > STYLE_Z: return "Striker"
              if td > STYLE_Z and ctrl > STYLE_Z and sub < STYLE_Z: return "Wrestler"
              if sub > STYLE_Z and ctrl > STYLE_Z: return "BJJ"
              if cli > STYLE_Z: return "Muay_Thai"
              if dist > STYLE_Z and sig > STYLE_Z and td < STYLE_Z: return "Sniper"
              return "Mixed"

          career_styled = career_df.copy()
          career_styled["career_style"] = career_styled.apply(classify, axis=1)
          print(f"✓ assign_fighting_styles: {dict(career_styled['career_style'].value_counts())}")

          merged = df.merge(
              career_styled[["fighter","fight_url"] +
                            [c for c in career_styled.columns if c.startswith("career_")]],
              on=["fighter","fight_url"], how="left"
          )
          diff_cols = [c for c in merged.columns if c.startswith("career_avg_")]
          pairs = []
          for furl, g in merged.groupby("fight_url"):
              if len(g) >= 2:
                  f1, f2 = g.iloc[0], g.iloc[1]
                  row = {"f1_won": int(f1["won"]), "weight_class": f1.get("weight_class","Unknown")}
                  for c in diff_cols:
                      row[f"diff_{c}"] = (f1.get(c) or 0) - (f2.get(c) or 0)
                  pairs.append(row)

          matchup_df = pd.DataFrame(pairs)
          print(f"✓ build_matchup_features: {len(matchup_df)} matchups")
          assert len(matchup_df) > 0, "No matchups built"

          from sklearn.linear_model import LogisticRegression
          from sklearn.preprocessing import StandardScaler
          from sklearn.pipeline import Pipeline

          feat_cols = [c for c in matchup_df.columns if c.startswith("diff_")]
          X = matchup_df[feat_cols].fillna(0).values
          y = matchup_df["f1_won"].values

          if len(X) >= 4 and len(set(y)) >= 2:
              pipeline = Pipeline([("scaler", StandardScaler()),
                                   ("clf", LogisticRegression(C=1.0, max_iter=500, random_state=42))])
              pipeline.fit(X, y)
              probs = pipeline.predict_proba(X[:3])
              assert all(0.0 <= p <= 1.0 for p in probs[:,1])
              print(f"✓ Logit model trained: {len(X)} matchups, probs={probs[:,1].round(3)}")

              bundle = {"pipeline": pipeline, "feature_cols": feat_cols,
                        "career_styled": career_styled}
              raw = pickle.dumps(bundle, protocol=4)
              assert pickle.loads(raw)["pipeline"] is not None
              print(f"✓ model_bundle.pkl serializes OK ({len(raw):,} bytes)")
          elif len(set(y)) < 2:
              print(f"  [SKIP] Training data has only one class — need wins AND losses in sample data")
          else:
              print(f"  [SKIP] {len(X)} matchups — need ≥4 (fine for sample data)")

          events = df.sort_values("event_date")["event_name"].dropna().unique()
          titles = {
              "recent": events[-1] if len(events) else "",
              "recent_date": str(df["event_date"].max().date()),
              "upcoming": "", "upcoming_date": "",
              "updated_at": datetime.utcnow().isoformat(),
          }
          json.dumps(titles)
          print(f"✓ fight_titles.json structure valid")
          print(f"\n✓ Wednesday pipeline simulation complete")
          PYEOF

      - name: "TEST: v1_train_model — column aliases + pipeline"
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: |
          python3 - <<'PYEOF'
          import sys, warnings, io, os, base64, requests
          import numpy as np, pandas as pd
          warnings.filterwarnings("ignore")

          token = os.environ.get("ZWINSHIP_PAT")
          headers = {"Authorization": f"token {token}",
                     "Accept": "application/vnd.github.v3+json"}

          url  = "https://api.github.com/repos/zwinship/OctaStats_UFC_Model_V2/contents/data/raw/fight_stats.csv"
          resp = requests.get(url, headers=headers, timeout=15)
          assert resp.status_code == 200
          content = base64.b64decode(resp.json()["content"]).decode("utf-8")
          fights = pd.read_csv(io.StringIO(content))

          # Apply aliases that v1_train_model.py needs
          fights["date"]   = pd.to_datetime(fights["event_date"], errors="coerce")
          fights["event"]  = fights["event_name"]
          fights["result"] = fights["won"].map({1: "W", 0: "L"})
          print(f"✓ Column aliases applied (date, event, result)")

          V1_STAT_COLS = [
              "kd","sig_str_landed","sig_str_att","total_str_landed",
              "total_str_att","td_landed","td_att","sub_att",
              "ctrl_seconds","head_landed","body_landed","leg_landed",
              "distance_landed","clinch_landed","ground_landed",
          ]
          fights = fights.sort_values("date")
          career_rows = []
          for _, row in fights.iterrows():
              fighter  = row["fighter"]
              fight_dt = row["date"]
              prior    = fights[(fights["fighter"] == fighter) & (fights["date"] < fight_dt)]
              rec = {"fighter": fighter, "date": fight_dt,
                     "event": row.get("event",""), "result": row.get("result",""),
                     "weight_class": row.get("weight_class","")}
              for col in V1_STAT_COLS:
                  rec[f"avg_{col}"] = prior[col].mean() if len(prior) else np.nan
              career_rows.append(rec)

          career_df = pd.DataFrame(career_rows)
          print(f"✓ V1 career averages: {len(career_df)} rows")

          matchups = []
          for (event, date), grp in career_df.groupby(["event","date"]):
              fighters = grp.reset_index(drop=True)
              for i in range(0, len(fighters)-1, 2):
                  f1, f2 = fighters.iloc[i], fighters.iloc[i+1]
                  row = {"weight_class": f1.get("weight_class","Unknown"),
                         "f1_won": 1 if f1.get("result","") == "W" else 0}
                  for col in V1_STAT_COLS:
                      ac = f"avg_{col}"
                      row[f"diff_{col}"] = (f1.get(ac) or 0) - (f2.get(ac) or 0)
                  matchups.append(row)

          matchup_df = pd.DataFrame(matchups) if matchups else pd.DataFrame()
          if matchup_df.empty:
              print("✗ No matchups built — column aliases may not have resolved correctly")
              sys.exit(1)
          print(f"✓ V1 matchup features: {len(matchup_df)} matchups")

          if len(matchup_df) >= 4:
              from sklearn.linear_model import LinearRegression
              from sklearn.preprocessing import StandardScaler
              feat_cols = [c for c in matchup_df.columns if c.startswith("diff_")]
              X  = matchup_df[feat_cols].fillna(0).values
              y  = matchup_df["f1_won"].values
              sc = StandardScaler(); X_sc = sc.fit_transform(X)
              lr = LinearRegression(); lr.fit(X_sc, y)
              print(f"✓ V1 LinearRegression trained: {len(X)} matchups")
          else:
              print(f"  [SKIP] {len(matchup_df)} matchups — need ≥4")

          print(f"\n✓ v1_train_model column compatibility confirmed")
          PYEOF

      - name: "TEST: OCTASTATS_PAT can reach site repo for dispatch"
        env:
          OCTASTATS_PAT: ${{ secrets.OCTASTATS_PAT }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $OCTASTATS_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/OctaStats/OctaStats.github.io)
          if [ "$STATUS" = "200" ]; then
            echo "✓ OCTASTATS_PAT can reach OctaStats.github.io"
          elif [ "$STATUS" = "401" ]; then
            echo "✗ OCTASTATS_PAT invalid or expired"; exit 1
          elif [ "$STATUS" = "404" ]; then
            echo "✗ Repo OctaStats/OctaStats.github.io not found"; exit 1
          else
            echo "✗ Unexpected HTTP $STATUS"; exit 1
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Friday workflow simulation
  # ────────────────────────────────────────────────────────────────────────────
  test-friday-pipeline:
    name: "📅 Friday Pipeline (predictions)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test-fight-stats-schema

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas numpy scipy scikit-learn playwright

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: "TEST: 04_predict — upcoming event + clean_event_name()"
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: |
          if [ "${{ github.event.inputs.skip_odds }}" = "true" ]; then
            python scripts/04_predict.py --test --mock
          else
            python scripts/04_predict.py --test
          fi

      - name: "TEST: v1_predict — upcoming event scraping"
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: python scripts/v1_predict.py --test

      - name: "TEST: clean_event_name() Python/JS parity"
        run: |
          python3 - <<'PYEOF'
          import re, sys

          def clean(name):
              return re.sub(r'\s+', '_', re.sub(r'[^\w\s]', '', name, flags=re.ASCII))

          cases = [
              ("UFC 309: Jones vs Miocic",              "UFC_309_Jones_vs_Miocic"),
              ("UFC Fight Night: Holloway vs Topuria",   "UFC_Fight_Night_Holloway_vs_Topuria"),
              ("UFC 310",                                "UFC_310"),
              ("UFC Fight Night: dos Santos vs Tuivasa", "UFC_Fight_Night_dos_Santos_vs_Tuivasa"),
              ("UFC 300: Pereira vs Hill",               "UFC_300_Pereira_vs_Hill"),
          ]
          all_pass = True
          for name, expected in cases:
              got = clean(name)
              ok  = got == expected
              print(f"  {'✓' if ok else '✗'}  {got!r}")
              if not ok: print(f"       expected: {expected!r}"); all_pass = False

          sys.exit(0 if all_pass else 1)
          PYEOF

      - name: "TEST: fight_titles.json — keys required by update_site.yml"
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, requests, json, base64

          token = os.environ.get("ZWINSHIP_PAT")
          headers = {"Authorization": f"token {token}",
                     "Accept": "application/vnd.github.v3+json"}

          url  = "https://api.github.com/repos/zwinship/OctaStats_UFC_Model_V2/contents/titles/fight_titles.json"
          resp = requests.get(url, headers=headers, timeout=10)

          if resp.status_code == 404:
              print("  ○ fight_titles.json not yet created — will be written by 04_predict.py")
              print("  ✓ Expected pre-fight-week status")
              sys.exit(0)
          elif resp.status_code != 200:
              print(f"  ✗ HTTP {resp.status_code}"); sys.exit(1)

          titles  = json.loads(base64.b64decode(resp.json()["content"]).decode("utf-8"))
          # upcoming_date and recent_date written by 04_predict.py — may be absent pre-fight-week
          missing_now    = [k for k in ["upcoming","recent","updated_at"] if k not in titles]
          missing_friday = [k for k in ["upcoming_date","recent_date"]    if k not in titles]
          if missing_now:
              print(f"  ✗ fight_titles.json missing required keys: {missing_now}"); sys.exit(1)
          if missing_friday:
              print(f"  ○ fight_titles.json missing Friday keys (expected pre-fight-week): {missing_friday}")
          print(f"  ✓ fight_titles.json structure OK")
          for k, v in titles.items():
              print(f"    {k}: {v!r}")
          PYEOF

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4: Sunday workflow simulation
  # ────────────────────────────────────────────────────────────────────────────
  test-sunday-pipeline:
    name: "📅 Sunday Pipeline (results + stats)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test-fight-stats-schema

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas numpy scipy scikit-learn

      - name: "TEST: 05_scrape_results — fight-existence check"
        run: python scripts/05_scrape_results.py --test
        continue-on-error: true   # mid-week skip expected

      - name: "TEST: v1_scrape_results — fight-existence check (V1)"
        run: python scripts/v1_scrape_results.py --test
        continue-on-error: true

      - name: "TEST: fight-existence logic — cancelled bout returns None not L"
        run: |
          python3 - <<'PYEOF'
          import sys

          def match_result(fighter_name, winners_dict, fought_set):
              name_l = fighter_name.lower().strip() if fighter_name else ""
              if name_l in fought_set:
                  return winners_dict.get(name_l)
              last = name_l.split()[-1] if name_l else ""
              for k in fought_set:
                  if last and last in k:
                      return winners_dict.get(k)
              parts = [p for p in name_l.split() if len(p) > 3]
              for k in fought_set:
                  if any(p in k for p in parts):
                      return winners_dict.get(k)
              return None

          winners = {"jon jones":"W","stipe miocic":"L","alex pereira":"W","khalil rountree":"L"}
          fought  = set(winners.keys())
          tests   = [
              ("Jon Jones",         "W",  "Exact match winner"),
              ("Stipe Miocic",      "L",  "Exact match loser"),
              ("Jones",             "W",  "Last-name match"),
              ("Alex Pereira",      "W",  "Full name match"),
              ("Cancelled Fighter", None, "Cancelled → must be None not L"),
              ("Unknown Person",    None, "Unknown → None"),
              ("",                  None, "Empty → None"),
          ]
          all_pass = True
          for name, expected, desc in tests:
              got = match_result(name, winners, fought)
              ok  = got == expected
              print(f"  {'✓' if ok else '✗'}  {desc}: got={got!r}")
              if not ok: all_pass = False

          assert match_result("Cancelled Fighter", winners, fought) is None
          sys.exit(0 if all_pass else 1)
          PYEOF

      - name: "TEST: 06_statistics — t-test + JSON output matches update_site.yml expectations"
        run: |
          python3 - <<'PYEOF'
          import sys, json, numpy as np
          from scipy import stats as scipy_stats

          np.random.seed(42)
          n = 80
          odds_list = np.random.choice([-150,-130,-110,110,130,150,200,-200], n)
          bet_sizes = np.random.choice([1,2,3], n).astype(float)

          def implied(o): return abs(o)/(abs(o)+100) if o < 0 else 100/(o+100)
          def pnl(won, odds, bet):
              return bet*((100/abs(odds)) if odds<0 else (odds/100)) if won else -bet

          wins    = np.random.binomial(1, np.minimum(np.array([implied(o)*1.08 for o in odds_list]), 0.99), n)
          returns = np.array([pnl(wins[i],odds_list[i],bet_sizes[i])+bet_sizes[i] for i in range(n)])
          mult    = returns / bet_sizes
          t, p2   = scipy_stats.ttest_1samp(mult, 0.96)
          p1      = p2/2 if t > 0 else 1 - p2/2

          out = {
              "overall_performance": {
                  "total_bets": n, "total_wins": int(wins.sum()),
                  "win_rate_pct": round(float(wins.mean())*100,2),
                  "net_units":    round(float(returns.sum()-bet_sizes.sum()),2),
                  "rtp_pct":      round(float(returns.sum()/bet_sizes.sum())*100,2),
              },
              "t_test": {
                  "t_statistic":       float(t),
                  "p_value_one_sided": float(p1),
                  "conclusion":        "Reject H0" if p1<0.05 else "Fail to reject H0",
              }
          }
          json.dumps(out)
          assert "overall_performance" in out and "t_test" in out
          assert "win_rate_pct" in out["overall_performance"]
          assert "conclusion" in out["t_test"]
          print(f"✓ Statistics JSON structure valid")
          print(f"  win_rate={out['overall_performance']['win_rate_pct']}%  "
                f"net={out['overall_performance']['net_units']:+.2f}u")
          PYEOF

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 5: update_site.yml simulation
  # ────────────────────────────────────────────────────────────────────────────
  test-site-update:
    name: "🌐 update_site.yml Simulation"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test-fight-stats-schema

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: "TEST: PATs can reach both data repos"
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, requests

          token = os.environ.get("ZWINSHIP_PAT")
          headers = {"Authorization": f"token {token}",
                     "Accept": "application/vnd.github.v3+json"}

          all_ok = True
          for repo in ["zwinship/OctaStats_UFC_Model_V2", "zwinship/UFC_Model"]:
              resp = requests.get(f"https://api.github.com/repos/{repo}",
                                  headers=headers, timeout=10)
              ok = resp.status_code == 200
              print(f"  {'✓' if ok else '✗'}  {repo} (HTTP {resp.status_code})")
              if not ok: all_ok = False

          sys.exit(0 if all_ok else 1)
          PYEOF

      - name: "TEST: site-data.json builder simulation — exact update_site.yml logic"
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, json, requests

          token = os.environ.get("ZWINSHIP_PAT")
          headers = {"Authorization": f"token {token}",
                     "Accept": "application/vnd.github.v3+json"}

          DATA_BASE    = "https://raw.githubusercontent.com/zwinship/OctaStats_UFC_Model_V2/main"
          V1_DATA_BASE = "https://raw.githubusercontent.com/zwinship/UFC_Model/main"

          def fetch_json(url):
              try:
                  r = requests.get(url, timeout=15)
                  return r.json() if r.status_code == 200 else {}
              except: return {}

          titles   = fetch_json(f"{DATA_BASE}/titles/fight_titles.json")
          v2_stats = fetch_json(f"{DATA_BASE}/statistics/v2_statistical_analysis.json")
          v1_stats = fetch_json(f"{V1_DATA_BASE}/statistics/v1_statistical_analysis.json")

          print(f"  fight_titles.json:            {'✓ found' if titles else '○ not yet created (expected)'}")
          print(f"  v2_statistical_analysis.json: {'✓ found' if v2_stats else '○ not yet created (expected)'}")
          print(f"  v1_statistical_analysis.json: {'✓ found' if v1_stats else '○ not yet created (expected)'}")

          site_data = {
              "v2": {
                  "upcoming_event": titles.get("upcoming",""),
                  "upcoming_date":  titles.get("upcoming_date",""),
                  "recent_event":   titles.get("recent",""),
                  "recent_date":    titles.get("recent_date",""),
                  "data_base_url":  DATA_BASE,
                  "stats":          v2_stats,
              },
              "v1": {
                  "data_base_url": V1_DATA_BASE,
                  "stats":         v1_stats,
              },
              "last_updated": titles.get("updated_at",""),
          }

          REQUIRED = [
              "v2.upcoming_event","v2.upcoming_date","v2.recent_event","v2.recent_date",
              "v2.data_base_url","v2.stats","v1.data_base_url","v1.stats","last_updated",
          ]
          all_ok = True
          for path in REQUIRED:
              obj = site_data
              for key in path.split("."): obj = obj.get(key) if isinstance(obj,dict) else None
              ok = obj is not None
              print(f"  {'✓' if ok else '✗'}  site_data.{path}")
              if not ok: all_ok = False

          json.dumps(site_data)
          print(f"\n  ✓ site-data.json serializes to valid JSON")

          if all_ok:
              print("\n✓ update_site.yml will produce a valid site-data.json")
          else:
              print("\n  ○ Some stats/titles files not yet created — expected pre-fight-week")
              print("  These populate after Wednesday + Friday workflows run")
          # Don't fail — missing upstream files are normal before first real run
          PYEOF

  # ────────────────────────────────────────────────────────────────────────────
  # FINAL: Summary
  # ────────────────────────────────────────────────────────────────────────────
  test-summary:
    name: "✅ Test Summary"
    runs-on: ubuntu-latest
    needs:
      - test-fight-stats-schema
      - test-wednesday-pipeline
      - test-friday-pipeline
      - test-sunday-pipeline
      - test-site-update
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "======================================"
          echo "OCTASTATS PIPELINE TEST RESULTS"
          echo "======================================"
          echo ""
          echo "Job results:"
          echo "  fight_stats.csv Schema  : ${{ needs.test-fight-stats-schema.result }}"
          echo "  Wednesday Pipeline      : ${{ needs.test-wednesday-pipeline.result }}"
          echo "  Friday Pipeline         : ${{ needs.test-friday-pipeline.result }}"
          echo "  Sunday Pipeline         : ${{ needs.test-sunday-pipeline.result }}"
          echo "  update_site.yml Sim     : ${{ needs.test-site-update.result }}"
          echo ""
          if [ "${{ needs.test-fight-stats-schema.result }}" = "success" ] && \
             [ "${{ needs.test-wednesday-pipeline.result }}" = "success" ] && \
             [ "${{ needs.test-friday-pipeline.result }}"    = "success" ] && \
             [ "${{ needs.test-sunday-pipeline.result }}"    = "success" ] && \
             [ "${{ needs.test-site-update.result }}"        = "success" ]; then
            echo "✅ ALL TESTS PASSED — pipeline is ready for deployment"
          else
            echo "❌ SOME TESTS FAILED — review the logs above before deploying"
            exit 1
          fi
