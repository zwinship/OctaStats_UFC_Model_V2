name: Friday — Run Fight Predictions

on:
  schedule:
    # Every Friday at noon UTC (8am ET)
    - cron: '0 12 * * 5'
  workflow_dispatch:

jobs:
  predict:
    name: Generate Fight Predictions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 lxml pandas numpy scipy scikit-learn playwright

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run V2 predictions
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
          GAMBLY_COOKIE: ${{ secrets.GAMBLY_COOKIE }}
          GAMBLY_TOKEN_SET: ${{ secrets.GAMBLY_TOKEN_SET }}
          PYTHONUNBUFFERED: "1"
        run: |
          echo "=== V2: Dynamic logit predictions ==="
          python -u scripts/04_predict.py

      - name: Run V1 predictions
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: |
          echo "=== V1: Linear regression predictions ==="
          python scripts/v1_predict.py

      - name: Notify OctaStats site to refresh predictions page
        if: success()
        env:
          OCTASTATS_PAT: ${{ secrets.OCTASTATS_PAT }}
        run: |
          curl -X POST \
            -H "Authorization: token $OCTASTATS_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/OctaStats/OctaStats.github.io/dispatches \
            -d '{"event_type":"predictions-updated","client_payload":{"trigger":"friday-predictions"}}'
          echo "Predictions update triggered on OctaStats site"

      - name: Log completion
        if: always()
        run: |
          echo "Friday predictions pipeline completed at $(date -u)"
