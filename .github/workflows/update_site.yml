name: Refresh GitHub Pages Site

on:
  # Triggered by zwinship/OctaStats_UFC_Model_V2 after each pipeline run
  repository_dispatch:
    types:
      - data-updated
      - predictions-updated
      - results-updated

  # Also allow manual trigger
  workflow_dispatch:

  # Fallback: run daily at 6am UTC in case a dispatch was missed
  schedule:
    - cron: '0 6 * * *'

jobs:
  update-site:
    name: Pull Latest Data & Rebuild Site
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout OctaStats.github.io
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch latest data from zwinship repo and update site metadata
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: |
          python - <<'EOF'
          import requests
          import json
          import base64
          import os

          token      = os.environ["ZWINSHIP_PAT"]
          gh_headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json",
          }

          DATA_BASE   = "https://raw.githubusercontent.com/zwinship/OctaStats_UFC_Model_V2/main"
          V1_DATA_BASE = "https://raw.githubusercontent.com/zwinship/UFC_Model/main"

          def fetch_json(url):
              try:
                  r = requests.get(url, timeout=15)
                  return r.json() if r.status_code == 200 else {}
              except Exception:
                  return {}

          # Fetch fight titles
          titles = fetch_json(f"{DATA_BASE}/titles/fight_titles.json")

          # Fetch V2 stats
          v2_stats = fetch_json(f"{DATA_BASE}/statistics/v2_statistical_analysis.json")

          # Fetch V1 stats
          v1_stats = fetch_json(f"{V1_DATA_BASE}/statistics/ufc_statistical_analysis.json")

          # Build site-data.json consumed by all HTML pages
          site_data = {
              "v2": {
                  "upcoming_event": titles.get("upcoming", ""),
                  "upcoming_date":  titles.get("upcoming_date", ""),
                  "recent_event":   titles.get("recent", ""),
                  "recent_date":    titles.get("recent_date", ""),
                  "data_base_url":  DATA_BASE,
                  "stats":          v2_stats,
              },
              "v1": {
                  "data_base_url": V1_DATA_BASE,
                  "stats":         v1_stats,
              },
              "last_updated": titles.get("updated_at", ""),
          }

          os.makedirs("assets/data", exist_ok=True)
          with open("assets/data/site-data.json", "w") as f:
              json.dump(site_data, f, indent=2)

          print(f"site-data.json written")
          print(f"  V2 upcoming: {site_data['v2']['upcoming_event']}")
          print(f"  V2 recent:   {site_data['v2']['recent_event']}")
          EOF

      - name: Commit and push updated site data
        run: |
          git config user.name  "OctaStats Bot"
          git config user.email "bot@octastats.io"
          git add assets/data/site-data.json
          git diff --staged --quiet || \
            git commit -m "Auto: update site data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Log trigger source
        run: |
          echo "Site updated. Trigger: ${{ github.event.action }} ${{ github.event.client_payload.trigger }}"
          echo "Completed at $(date -u)"
