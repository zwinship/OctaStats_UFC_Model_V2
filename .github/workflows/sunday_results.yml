name: Sunday — Record Results & Update Statistics

on:
  schedule:
    # Every Sunday at noon UTC (8am ET)
    - cron: '0 12 * * 0'
  workflow_dispatch:

jobs:
  results-and-stats:
    name: Record Results & Compute Statistics
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            beautifulsoup4 \
            lxml \
            pandas \
            numpy \
            scipy \
            scikit-learn

      - name: Scrape V2 fight results
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: |
          echo "=== V2: Scraping post-fight results ==="
          python scripts/05_scrape_results.py

      - name: Run V2 statistical analysis
        env:
          ZWINSHIP_PAT: ${{ secrets.ZWINSHIP_PAT }}
        run: |
          echo "=== V2: Computing statistics ==="
          python scripts/06_statistics.py

      - name: Notify OctaStats site to refresh results and statistics
        if: success()
        env:
          OCTASTATS_PAT: ${{ secrets.OCTASTATS_PAT }}
        run: |
          curl -X POST \
            -H "Authorization: token $OCTASTATS_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/OctaStats/OctaStats.github.io/dispatches \
            -d '{"event_type":"results-updated","client_payload":{"trigger":"sunday-results"}}'
          echo "Results update triggered on OctaStats site"

      - name: Log completion
        if: always()
        run: |
          echo "Sunday results pipeline completed at $(date -u)"
